name: Sovereign Dominion CI/CD
on:
  push:
    branches: [main, 'production/**']
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}' }
      - run: npm install
      - run: npx tsc --noEmit
      - run: npm run lint

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}' }
      - run: npm install
      - run: npm audit --audit-level=critical

  test:
    needs: [lint-typecheck, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}' }
      - run: npm install
      - run: npm test

  kernel:
    # @sovereign/kernel (kernel/) is its own package with its own
    # package.json/node_modules — the root `npm test` job above never touches
    # it. Without this job, kernel/test/*.test.mjs only ever ran locally.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}' }
      - run: npm install
        working-directory: kernel
      - run: npm test
        working-directory: kernel

  deploy-preview:
    if: github.ref != 'refs/heads/main'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}' }
      - run: npm install && npm run build
      - if: ${{ secrets.CF_API_TOKEN != '' }}
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: sovereign-dominion
          directory: dist
          branch: ${{ github.head_ref }}

  deploy-production:
    if: github.ref == 'refs/heads/main'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}' }
      - run: npm install && npm run build
      - if: ${{ secrets.CF_API_TOKEN != '' }}
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: sovereign-dominion
          directory: dist
          branch: main
